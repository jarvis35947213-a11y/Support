<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Jarvis Support</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-avatar">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <h1>Support Panel</h1>
    <p>Введите пароль для входа</p>
    <input id="loginPw" type="password" placeholder="Пароль" autocomplete="off">
    <button id="loginBtn">Войти</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="messenger" class="hidden">
  <div id="leftPanel">
    <div id="leftHeader">
      <span class="left-title">Jarvis</span>
      <button id="logoutBtn" title="Выйти">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
    <div id="searchBox">
      <input id="searchInput" type="text" placeholder="Поиск...">
    </div>
    <div id="chatList"></div>
  </div>

  <div id="rightPanel">
    <div id="emptyState">
      <div class="empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>Jarvis Support</h2>
      <p>Выберите обращение слева</p>
    </div>

    <div id="chatView" class="hidden">
      <div id="chatHeader">
        <div class="chat-info">
          <div class="chat-avatar" id="chatAvatar">—</div>
          <div>
            <div class="chat-name" id="chatName">—</div>
            <div class="chat-status-bar" id="chatStatusBar"></div>
          </div>
        </div>
        <div class="chat-actions">
          <button id="closeTicketBtn" class="header-btn" title="Закрыть обращение">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
          </button>
          <button id="clearChatBtn" class="header-btn" title="Очистить чат">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
      <div id="messageContainer">
        <div id="messages"></div>
      </div>
      <div id="suggestBar" class="hidden">
        <div id="suggestContent"></div>
        <div id="suggestActions">
          <button id="suggestUseBtn">Вставить ответ</button>
          <button id="suggestDismissBtn">×</button>
        </div>
      </div>
      <div id="composeBar">
        <textarea id="replyInput" placeholder="Сообщение..." rows="1"></textarea>
        <button id="sendBtn" title="Отправить">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";

var API = "/api";
var selectedId = null;
var poll = null;
var allConvs = [];

function jwt(t) {
  if (t !== undefined) {
    if (t) { localStorage.setItem("jwt", t); }
    else { localStorage.removeItem("jwt"); }
  }
  return localStorage.getItem("jwt") || "";
}

async function api(m, p, b) {
  var o = { method: m, headers: { "Content-Type": "application/json" } };
  var tok = jwt();
  if (tok) o.headers["Authorization"] = "Bearer " + tok;
  if (b) o.body = JSON.stringify(b);
  var r = await fetch(API + p, o);
  return r.json();
}

function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function fmtTs(s) {
  if (!s) return "";
  var d = new Date(s);
  if (isNaN(d.getTime())) return (s || "").slice(11, 16);
  var now = new Date();
  var sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
  var weekAgo = now - d < 604800000;
  if (weekAgo) return d.toLocaleDateString("ru-RU", { weekday: "short", hour: "2-digit", minute: "2-digit" });
  return d.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function shortId(s) { return s ? (s.length > 10 ? s.slice(0, 10) + "…" : s) : "—"; }

// ── Auth ──
async function checkAuth() {
  var tok = jwt();
  if (!tok) return false;
  var r = await api("GET", "/conversations");
  return !r.error;
}

function showLogin() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("messenger").classList.add("hidden");
}
function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("messenger").classList.remove("hidden");
}

document.getElementById("loginBtn").onclick = async function () {
  var pw = document.getElementById("loginPw").value;
  var r = await api("POST", "/login", { password: pw });
  if (r.ok) {
    jwt(r.token);
    document.getElementById("loginError").textContent = "";
    document.getElementById("loginPw").value = "";
    showApp();
    loadConvs();
  } else {
    document.getElementById("loginError").textContent = "Неверный пароль";
  }
};
document.getElementById("loginPw").onkeydown = function (e) {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
};
document.getElementById("logoutBtn").onclick = function () {
  jwt("");
  if (poll) clearInterval(poll);
  selectedId = null;
  showLogin();
};

// ── Conversations list ──
async function loadConvs() {
  var convs = await api("GET", "/conversations");
  if (convs.error) { showLogin(); return; }
  allConvs = convs;
  var q = (document.getElementById("searchInput").value || "").toLowerCase();
  var list = document.getElementById("chatList");
  list.innerHTML = "";
  var filtered = q ? convs.filter(function (c) { return c.client_id.toLowerCase().indexOf(q) !== -1; }) : convs;
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var active = c.client_id === selectedId;
    var div = document.createElement("div");
    div.className = "chat-item" + (active ? " active" : "") + (c.status === "closed" ? " closed" : "");
    div.innerHTML =
      '<div class="ci-avatar">' + esc(shortId(c.client_id)) + '</div>' +
      '<div class="ci-body">' +
        '<div class="ci-top"><span class="ci-name">' + esc(c.client_id) + '</span><span class="ci-time">' + fmtTs(c.last_ts) + '</span></div>' +
        '<div class="ci-bottom"><span class="ci-preview">' + esc(c.preview ? c.preview.slice(0, 40) : "(пусто)") + '</span></div>' +
      '</div>';
    (function (id) { div.onclick = function () { selectChat(id); }; })(c.client_id);
    list.appendChild(div);
  }
}

// ── Select chat ──
async function selectChat(id) {
  selectedId = id;
  document.getElementById("emptyState").classList.add("hidden");
  document.getElementById("chatView").classList.remove("hidden");

  var convs = await api("GET", "/conversations");
  var conv = null;
  for (var i = 0; i < convs.length; i++) { if (convs[i].client_id === id) { conv = convs[i]; break; } }
  var st = conv ? conv.status : "open";

  document.getElementById("chatName").textContent = id;
  document.getElementById("chatAvatar").textContent = shortId(id);
  document.getElementById("chatStatusBar").innerHTML = st === "closed"
    ? '<span class="status-closed">✕ Закрыто</span>'
    : '<span class="status-open">○ Открыто</span>';

  var closeBtn = document.getElementById("closeTicketBtn");
  if (st === "closed") {
    closeBtn.innerHTML =
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
        '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>' +
      '</svg>';
    closeBtn.title = "Открыть заново";
    closeBtn.onclick = async function () { await api("POST", "/conversations/" + id + "/reopen"); selectChat(id); loadConvs(); };
  } else {
    closeBtn.innerHTML =
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
        '<path d="M18 6L6 18"/><path d="M6 6l12 12"/>' +
      '</svg>';
    closeBtn.title = "Закрыть обращение";
    closeBtn.onclick = async function () { await api("POST", "/conversations/" + id + "/close"); selectChat(id); loadConvs(); };
  }

  document.getElementById("clearChatBtn").onclick = async function () {
    if (!confirm("Очистить все сообщения?")) return;
    await api("DELETE", "/messages/" + id);
    loadMsgs(id);
    loadConvs();
  };

  loadMsgs(id);
  fetchSuggest(id);
  if (poll) clearInterval(poll);
  poll = setInterval(function () { loadMsgs(id, true); }, 3000);
  loadConvs();
}

async function fetchSuggest(id) {
  if (!id) return;
  var bar = document.getElementById("suggestBar");
  var content = document.getElementById("suggestContent");
  content.textContent = "Думаю...";
  bar.classList.remove("hidden");
  var r = await api("POST", "/conversations/" + id + "/suggest");
  if (r.ok && r.suggestion) {
    content.textContent = r.suggestion;
  } else {
    bar.classList.add("hidden");
  }
}

document.getElementById("suggestUseBtn").onclick = function () {
  var text = document.getElementById("suggestContent").textContent;
  if (text && text !== "Думаю...") {
    document.getElementById("replyInput").value = text;
    document.getElementById("replyInput").focus();
    document.getElementById("suggestBar").classList.add("hidden");
  }
};
document.getElementById("suggestDismissBtn").onclick = function () {
  document.getElementById("suggestBar").classList.add("hidden");
};

// ── Messages ──
async function loadMsgs(id, silent) {
  if (!id) return;
  var msgs = await api("GET", "/messages/" + id);
  var container = document.getElementById("messages");
  if (!silent) container.innerHTML = "";
  var existing = container.querySelectorAll(".msg-wrapper");
  if (existing.length === msgs.length) return;

  var lastRole = "";
  container.innerHTML = "";
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    var div = document.createElement("div");
    var same = m.role === lastRole;
    div.className = "msg-wrapper" + (same ? " grouped" : "");
    var roleLabel = m.role === "user" ? "Вы" : "Поддержка";
    div.innerHTML =
      '<div class="msg-role-label">' + roleLabel + '</div>' +
      '<div class="msg-row ' + (m.role === "user" ? "row-user" : "row-support") + '">' +
        (m.role === "support"
          ? '<div class="msg-avatar-small">S</div>'
          : '') +
        '<div class="msg-content">' +
          '<div class="bubble bubble-' + (m.role === "user" ? "user" : "support") + '">' + esc(m.text || "") + '</div>' +
          '<div class="msg-time">' + fmtTs(m.ts) + '</div>' +
        '</div>' +
      '</div>';
    container.appendChild(div);
    lastRole = m.role;
  }
  container.scrollTop = container.scrollHeight;
}

// ── Send ──
document.getElementById("sendBtn").onclick = async function () {
  var inp = document.getElementById("replyInput");
  var t = inp.value.trim();
  if (!t || !selectedId) return;
  inp.disabled = true;
  await api("POST", "/messages/" + selectedId, { text: t, role: "support", ts: new Date().toISOString() });
  inp.value = "";
  inp.style.height = "auto";
  inp.disabled = false;
  inp.focus();
  loadMsgs(selectedId);
  loadConvs();
};
document.getElementById("replyInput").onkeydown = function (e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); document.getElementById("sendBtn").click(); }
};
document.getElementById("replyInput").oninput = function () {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
};

// ── Search ──
document.getElementById("searchInput").oninput = function () { loadConvs(); };

// ── Init ──
(async function () {
  var tok = jwt();
  if (tok) {
    var ok = await checkAuth();
    if (ok) { showApp(); loadConvs(); return; }
  }
  showLogin();
})();
</script>
</body>
</html>
