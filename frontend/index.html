<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jarvis Support</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <div class="logo">J A R V I S</div>
    <div class="subtitle">Support Dashboard</div>
    <div class="badge" id="badge">0</div>
  </header>

  <div id="toolbar">
    <button id="refreshBtn" onclick="load()">⟳ Обновить</button>
    <button id="clearBtn" onclick="clearAll()">✕ Очистить всё</button>
  </div>

  <div id="messages"></div>
</div>

<script>
const API = "/api/messages";

async function load() {
  try {
    const r = await fetch(API);
    const msgs = await r.json();
    const container = document.getElementById("messages");
    container.innerHTML = "";
    document.getElementById("badge").textContent = msgs.length;

    for (const m of msgs) {
      const div = document.createElement("div");
      div.className = "msg " + (m.role === "user" ? "user" : "support");

      const meta = document.createElement("div");
      meta.className = "meta";
      const role = m.role === "user" ? "Пользователь" : "Поддержка";
      const ts = m.ts ? m.ts.slice(0, 19).replace("T", " ") : "";
      meta.textContent = role + " · " + ts;

      const text = document.createElement("div");
      text.className = "text";
      text.textContent = m.text || "(пусто)";

      div.appendChild(meta);
      div.appendChild(text);
      container.appendChild(div);
    }

    window.scrollTo(0, document.body.scrollHeight);
  } catch (e) {
    document.getElementById("messages").innerHTML =
      '<div class="error">Ошибка загрузки: ' + e.message + "</div>";
  }
}

async function clearAll() {
  if (!confirm("Очистить все сообщения?")) return;
  try {
    await fetch(API, { method: "DELETE" });
    load();
  } catch (e) {
    alert("Ошибка: " + e.message);
  }
}

load();
setInterval(load, 5000);
</script>
</body>
</html>
